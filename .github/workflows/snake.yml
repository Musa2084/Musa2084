name: Generate Snake

on:
  schedule:
    # Hər 12 saatdan bir avtomatik yenilənir
    - cron: "0 */12 * * *"
  
  # Actions tabından əllə başladılma icazəsi
  workflow_dispatch:
  
  # main və ya master branch-ına hər push olanda işə düşür
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Repozitoriyanı yoxlayır
      - uses: actions/checkout@v3

      # İlan oyununu animasiya edir (Qaranlıq rejim üçün transparan SVG)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Musa2084
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Yaradılan şəffaf SVG faylını "output" branch-ına yükləyir
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
